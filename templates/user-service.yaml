apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.userService.name }}
  labels:
    app: {{ .Release.Namespace }}
    module: {{ .Values.userService.name }}
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: {{ .Release.Namespace }}
      module: {{ .Values.userService.name }}
  replicas: {{ .Values.userService.replicas }}
  template:
    metadata:
      labels:
        app: {{ .Release.Namespace }}
        module: {{ .Values.userService.name }}
    spec:
      containers:
        - image: "{{ .Values.image.repository }}/{{ .Values.userService.name }}:{{ .Values.userService.tag | default .Chart.AppVersion }}"
          name: {{ .Values.userService.name }}
          imagePullPolicy: {{ .Values.image.pullPolicy}}
          env:
            - name: JAVA_OPTS
              value: {{ .Values.userService.JAVA_OPTS }}  # Giới hạn dung lượng heap tối đa của JVM và sử dụng Garbage Collector
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.userService.SPRING_PROFILES_ACTIVE }}
          resources:
            {{- toYaml .Values.userService.resources | nindent 10 }}
          ports:
            - containerPort: 9999
      imagePullSecrets:
        - name: harbor
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.userService.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Namespace }}
    module: {{ .Values.userService.name }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Namespace }}
    module: {{ .Values.userService.name }}
  ports:
    - name: {{ .Values.userService.name }}-port
      protocol: TCP
      port: 9999
      targetPort: 9999
{{- if .Values.authorizationPolicies.create }}
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: {{ .Values.productService.name }}
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.productService.name }}
  rules:
    - from:
        - source:
            namespaces:
              - {{ .Release.Namespace }}
      to:
        - operation:
            paths:
              - /api/shopping-cart/*
            methods:
              - POST
{{- end }}
