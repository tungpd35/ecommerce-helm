apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.webapp.name }}
  labels:
    app: {{ .Release.Namespace }}
    module: {{ .Values.webapp.name }}
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: {{ .Release.Namespace }}
      module: {{ .Values.webapp.name }}
  replicas: {{ .Values.webapp.replicas }}
  template:
    metadata:
      labels:
        app: {{ .Release.Namespace }}
        module: {{ .Values.webapp.name }}
    spec:
      containers:
        - image: "{{ .Values.image.repository }}/{{ .Values.webapp.name }}:{{ .Values.webapp.tag | default .Chart.AppVersion }}"
          name: {{ .Values.webapp.name }}
          imagePullPolicy: {{ .Values.image.pullPolicy}}
          resources:
            {{- toYaml .Values.webapp.resources | nindent 10 }}
          ports:
            - containerPort: 3000
      imagePullSecrets:
        - name: harbor
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.webapp.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Namespace }}
    module: {{ .Values.webapp.name }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Namespace }}
    module: {{ .Values.webapp.name }}
  ports:
    - name: {{ .Values.webapp.name }}-port
      protocol: TCP
      port: 80
      targetPort: 3000
