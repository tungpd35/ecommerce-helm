apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: {{ .Release.Namespace }}-gateway
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    istio: ingressgateway # use istio default controller
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*"
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: {{ .Release.Namespace }}-ingress
  namespace: {{ .Release.Namespace }}
spec:
  hosts:
    - "*"
  gateways:
    - {{ .Release.Namespace }}-gateway
  http:
    - name: {{ .Values.webapp.name }}
      match:
        - uri:
            prefix: /
      route:
        - destination:
            host: {{ .Values.webapp.name }}
            port:
              number: 80
    - name: {{ .Values.userService.name }}
      match:
        - uri:
            prefix: /user/
      route:
        - destination:
            host: {{ .Values.userService.name }}
            port:
              number: 9999
    - name: {{ .Values.productService.name }}
      match:
        - uri:
            prefix: /product/
      route:
        - destination:
            host: {{ .Values.productService.name }}
            port:
              number: 9999